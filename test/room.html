<!DOCTYPE html>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
<title>Steel Stacks | Room test</title>
<script src="https://ufx.space/UFX.js"></script>
<script src="../util.js"></script>
<script src="../blocks.js"></script>
<script src="../world.js"></script>
<script src="../game.js"></script>
<script src="../room_data.js"></script>
<canvas id=canvas style="background: black ; image-rendering: pixelated"></canvas>
<script>
"use strict"
window.onerror = function (error, url, line) {
	document.body.innerHTML = "<p>Error in: "+url+"<p>line "+line+"<pre>"+error+"</pre>"
}
let canvas = document.getElementById("canvas")
canvas.width = 384
canvas.height = 288
let context = canvas.getContext("2d")
UFX.maximize(canvas, { resize: false })
UFX.draw.setcontext(context)
UFX.key.init()
UFX.key.watchlist = ["left", "right", "up", "down"]
UFX.resource.loadwebfonts("Pixelify Sans")
let toload = {
	tiles_ss: "../img/tiles_ss.png",
	character_ss: "../img/character_ss.png",
	door_ss: "../img/door_ss.png",
}
UFX.resource.load(toload)
UFX.resource.onload = () => {
	UFX.scene.push("room_test")
}
UFX.scene.init()
UFX.scenes.room_test = {
	start: function () {
		world.init()
	},
	think: function (dt) {
		for (let event of UFX.key.events()) {
			if (event.type == "down" && event.name == "down") world.transition([0, 1])
			if (event.type == "down" && event.name == "up") world.transition([0, -1])
			if (event.type == "down" && event.name == "left") world.transition([-1, 0])
			if (event.type == "down" && event.name == "right") world.transition([1, 0])
		}
	},
	draw: function () {
		UFX.draw("fs #070f17 f0")
		world.room.draw()
		let lines = [
			`room_coord: ${world.room_coord}`,
			`room_id: ${world.room.room_id}`,
		]
		UFX.draw.text(lines.join("\n"), [0, 2], 12, "Pixelify Sans", { fill: "white", tab: "left top" })
	},
}
</script>
