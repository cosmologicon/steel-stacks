 <!DOCTYPE html>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
<title>Steel Stacks | Room test</title>
<script src="https://ufx.space/UFX.js"></script>
<script src="../util.js"></script>
<script src="../world.js"></script>
<script src="../room_data.js"></script>
<canvas id=canvas style="background: black ; image-rendering: pixelated"></canvas>
<script>
"use strict"
window.onerror = function (error, url, line) {
	document.body.innerHTML = "<p>Error in: "+url+"<p>line "+line+"<pre>"+error+"</pre>"
}
let canvas = document.getElementById("canvas")
canvas.width = 384
canvas.height = 288
let context = canvas.getContext("2d")
UFX.maximize(canvas, { resize: false })
UFX.draw.setcontext(context)
UFX.resource.loadwebfonts("Pixelify Sans")
let toload = {
	tiles_ss: "../img/tiles_ss.png",
	door_ss: "../img/door_ss.png",
}
UFX.resource.load(toload)
UFX.resource.onload = () => {
	let room = new Room("pw_2")
//	room.checkpoint.activate()
	room.receivers[0].activate()
	UFX.draw("fs #1c253c f0")
	room.draw()
}
</script>
